name: Site build

on:
  push:
    branches:
      - master
      - main
      - v1.0-dev
    paths:
      - "Gemfile"
      - "Gemfile.lock"
      - "_config.yml"
      - "_data/**"
      - "_pages/**"
      - "_posts/**"
      - "_projects/**"
      - "assets/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    branches:
      - master
      - main
      - v1.0-dev
    paths:
      - "Gemfile"
      - "Gemfile.lock"
      - "_config.yml"
      - "_data/**"
      - "_pages/**"
      - "_posts/**"
      - "_projects/**"
      - "assets/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/unit-tests.yml"

jobs:
  site-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install JS deps
        run: npm ci

      - name: Run style contract lint
        run: npm run lint:style-contract

      - name: Install build prerequisites
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert

      - name: Build personal site
        run: bundle exec jekyll build
